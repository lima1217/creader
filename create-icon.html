<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CReader Icon Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        h1 {
            color: #333;
            margin: 0;
        }
        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 14px;
            font-weight: 500;
            color: #555;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        select, button {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
            cursor: pointer;
        }
        button {
            background: #007AFF;
            color: white;
            border: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        #preview {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }
        .preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .preview-item span {
            font-size: 12px;
            color: #666;
        }
        canvas {
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <h1>📚 CReader 图标生成器</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>主色调</label>
            <input type="color" id="primaryColor" value="#4A90E2">
        </div>
        
        <div class="control-group">
            <label>辅助色</label>
            <input type="color" id="secondaryColor" value="#5BA3F5">
        </div>
        
        <div class="control-group">
            <label>图标风格</label>
            <select id="style">
                <option value="modern">现代简约 - 书本</option>
                <option value="gradient">渐变风格 - 打开的书</option>
                <option value="minimal">极简主义 - C字母</option>
                <option value="rounded">圆润风格 - 书页</option>
            </select>
        </div>
        
        <button onclick="generateIcons()">生成预览</button>
        <button onclick="downloadAll()">下载所有尺寸</button>
    </div>
    
    <div id="preview"></div>

    <script>
        const sizes = [32, 128, 256, 512];
        const canvases = {};

        function drawModernIcon(ctx, size) {
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            const primary = document.getElementById('primaryColor').value;
            const secondary = document.getElementById('secondaryColor').value;
            gradient.addColorStop(0, primary);
            gradient.addColorStop(1, secondary);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Draw book shape
            ctx.fillStyle = 'white';
            const bookWidth = size * 0.5;
            const bookHeight = size * 0.65;
            const x = (size - bookWidth) / 2;
            const y = (size - bookHeight) / 2;
            
            // Book cover
            ctx.fillRect(x, y, bookWidth, bookHeight);
            
            // Book spine highlight
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x, y, bookWidth * 0.15, bookHeight);
            
            // Pages
            ctx.fillStyle = '#f0f0f0';
            const pageOffset = size * 0.015;
            ctx.fillRect(x + pageOffset, y - pageOffset, bookWidth, bookHeight);
            ctx.fillRect(x + pageOffset * 2, y - pageOffset * 2, bookWidth, bookHeight);
        }

        function drawGradientIcon(ctx, size) {
            const primary = document.getElementById('primaryColor').value;
            const secondary = document.getElementById('secondaryColor').value;
            
            // Background
            const bgGradient = ctx.createLinearGradient(0, 0, size, size);
            bgGradient.addColorStop(0, primary);
            bgGradient.addColorStop(1, secondary);
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, size, size);
            
            // Open book
            ctx.fillStyle = 'white';
            const centerX = size / 2;
            const centerY = size / 2;
            const bookWidth = size * 0.7;
            const bookHeight = size * 0.5;
            
            // Left page
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - bookHeight / 2);
            ctx.lineTo(centerX - bookWidth / 2, centerY - bookHeight / 2);
            ctx.lineTo(centerX - bookWidth / 2, centerY + bookHeight / 2);
            ctx.lineTo(centerX, centerY + bookHeight / 2);
            ctx.closePath();
            ctx.fill();
            
            // Right page
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - bookHeight / 2);
            ctx.lineTo(centerX + bookWidth / 2, centerY - bookHeight / 2);
            ctx.lineTo(centerX + bookWidth / 2, centerY + bookHeight / 2);
            ctx.lineTo(centerX, centerY + bookHeight / 2);
            ctx.closePath();
            ctx.fill();
            
            // Center line
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.lineWidth = size * 0.01;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - bookHeight / 2);
            ctx.lineTo(centerX, centerY + bookHeight / 2);
            ctx.stroke();
        }

        function drawMinimalIcon(ctx, size) {
            const primary = document.getElementById('primaryColor').value;
            const secondary = document.getElementById('secondaryColor').value;
            
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, primary);
            gradient.addColorStop(1, secondary);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Letter C
            ctx.strokeStyle = 'white';
            ctx.lineWidth = size * 0.12;
            ctx.lineCap = 'round';
            
            const centerX = size / 2;
            const centerY = size / 2;
            const radius = size * 0.3;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, Math.PI * 0.7, Math.PI * 1.3);
            ctx.stroke();
        }

        function drawRoundedIcon(ctx, size) {
            const primary = document.getElementById('primaryColor').value;
            const secondary = document.getElementById('secondaryColor').value;
            
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, primary);
            gradient.addColorStop(1, secondary);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, size, size);
            
            // Rounded book pages
            ctx.fillStyle = 'white';
            const layers = 3;
            const baseWidth = size * 0.45;
            const baseHeight = size * 0.6;
            const centerX = size / 2;
            const centerY = size / 2;
            const offset = size * 0.02;
            
            for (let i = layers - 1; i >= 0; i--) {
                const x = centerX - baseWidth / 2 + offset * i;
                const y = centerY - baseHeight / 2 - offset * i;
                const alpha = 1 - (i * 0.2);
                
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                const radius = size * 0.05;
                ctx.beginPath();
                ctx.moveTo(x + radius, y);
                ctx.lineTo(x + baseWidth - radius, y);
                ctx.quadraticCurveTo(x + baseWidth, y, x + baseWidth, y + radius);
                ctx.lineTo(x + baseWidth, y + baseHeight - radius);
                ctx.quadraticCurveTo(x + baseWidth, y + baseHeight, x + baseWidth - radius, y + baseHeight);
                ctx.lineTo(x + radius, y + baseHeight);
                ctx.quadraticCurveTo(x, y + baseHeight, x, y + baseHeight - radius);
                ctx.lineTo(x, y + radius);
                ctx.quadraticCurveTo(x, y, x + radius, y);
                ctx.closePath();
                ctx.fill();
            }
        }

        function generateIcons() {
            const preview = document.getElementById('preview');
            preview.innerHTML = '';
            
            const style = document.getElementById('style').value;
            
            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                switch(style) {
                    case 'modern':
                        drawModernIcon(ctx, size);
                        break;
                    case 'gradient':
                        drawGradientIcon(ctx, size);
                        break;
                    case 'minimal':
                        drawMinimalIcon(ctx, size);
                        break;
                    case 'rounded':
                        drawRoundedIcon(ctx, size);
                        break;
                }
                
                canvases[size] = canvas;
                
                const previewItem = document.createElement('div');
                previewItem.className = 'preview-item';
                
                const displayCanvas = canvas.cloneNode(true);
                displayCanvas.style.width = '128px';
                displayCanvas.style.height = '128px';
                
                const label = document.createElement('span');
                label.textContent = `${size}×${size}`;
                
                previewItem.appendChild(displayCanvas);
                previewItem.appendChild(label);
                preview.appendChild(previewItem);
            });
        }

        function downloadAll() {
            if (Object.keys(canvases).length === 0) {
                alert('请先生成预览');
                return;
            }
            
            sizes.forEach(size => {
                const canvas = canvases[size];
                const link = document.createElement('a');
                const filename = size === 256 ? '128x128@2x.png' : 
                                size === 128 ? '128x128.png' :
                                size === 32 ? '32x32.png' : 
                                'icon.png';
                link.download = filename;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
            
            alert('图标已下载！请将文件移动到 src-tauri/icons/ 目录');
        }

        // Initialize on load
        window.onload = () => {
            generateIcons();
        };

        // Update on color change
        document.getElementById('primaryColor').addEventListener('input', generateIcons);
        document.getElementById('secondaryColor').addEventListener('input', generateIcons);
        document.getElementById('style').addEventListener('change', generateIcons);
    </script>
</body>
</html>
